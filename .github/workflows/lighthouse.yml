name: Lighthouse CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse:
    name: Audit Lighthouse
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          # Démarre `next start` puis attend qu'il réponde
          urls: |
            http://localhost:3000
          # Lance et stoppe le serveur automatiquement
          # Le port par défaut est 3000
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
